<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onze Spellen | SpellenShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-6 sticky top-0 z-10">
        <h1 class="text-3xl font-extrabold text-center text-slate-800">SpellenShop</h1>
    </header>

    <!-- Hoofdinhoud -->
    <main class="max-w-6xl mx-auto p-6">
        <div id="loading" class="text-center py-20 text-slate-500">
            Spellen ophalen uit de database...
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Producten komen hier -->
        </div>
    </main>

    <script>
        // Vul hier je eigen Supabase gegevens in
        const SUPABASE_URL = 'https://maqddhglptutujgfidvh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_0nvRdxjniryd50xgSsGcBg_oP29z61-';
        
        async function laadProducten() {
            const productGrid = document.getElementById('product-grid');
            const loading = document.getElementById('loading');
            
            // Controleer of de URL correct is ingesteld
            if (SUPABASE_URL.includes('jouw-project-id') || !SUPABASE_URL.startsWith('http')) {
                loading.innerHTML = '<p class="text-red-500 font-bold">Configuratie-fout: Controleer je Supabase URL in de code.</p>';
                return;
            }

            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const { data, error } = await supabaseClient
                .from('products') 
                .select('*');

            loading.style.display = 'none';

            if (error) {
                productGrid.innerHTML = `<p class="col-span-full text-red-500 text-center">Fout bij laden: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                productGrid.innerHTML = `<p class="col-span-full text-center text-slate-500">Nog geen spellen gevonden.</p>`;
                return;
            }

            // Producten op het scherm tekenen
            productGrid.innerHTML = data.map(product => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                    <div class="h-48 bg-slate-100 flex items-center justify-center">
                        ${product.image_url ? `<img src="${product.image_url}" alt="${product.naam}" class="h-full w-full object-cover">` : '<span class="text-slate-400">Geen afbeelding</span>'}
                    </div>
                    <div class="p-4">
                        <h2 class="font-bold text-lg mb-1 truncate">${product.naam}</h2>
                        <p class="text-sm text-slate-500">Artikelnummer: ${product.sku}</p>
                    </div>
                </div>
            `).join('');
        }

        laadProducten();
    </script>
</body>
</html>
