<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellenShop - Instellingen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="app" class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-100 text-center">
        <h1 class="text-2xl font-bold mb-6 text-slate-800">SpellenShop Setup</h1>
        <div id="content">
            <p class="mb-6 text-slate-600">Voer hieronder je Supabase gegevens in om de shop te koppelen:</p>
            <input id="inUrl" placeholder="Supabase Project URL" class="block w-full border border-slate-300 p-3 mb-3 rounded-lg">
            <input id="inKey" placeholder="Supabase Anon Key" class="block w-full border border-slate-300 p-3 mb-6 rounded-lg">
            <button onclick="save()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-lg transition">Koppelen & Laden</button>
        </div>
    </div>

    <script>
        function save() {
            localStorage.setItem('supabase_url', document.getElementById('inUrl').value);
            localStorage.setItem('supabase_key', document.getElementById('inKey').value);
            location.reload();
        }

        async function init() {
            const url = localStorage.getItem('supabase_url');
            const key = localStorage.getItem('supabase_key');
            if (url && key) {
                document.getElementById('content').innerHTML = '<p class="text-green-600 font-bold">Verbinden...</p>';
                try {
                    const client = supabase.createClient(url, key);
                    const { data, error } = await client.from('products').select('*');
                    if (error) throw error;
                    document.getElementById('app').innerHTML = '<h1 class="text-3xl font-bold">Shop geladen!</h1><p class="mt-4">Kijk in de console voor de data.</p>';
                    console.log("Producten uit database:", data);
                } catch(e) {
                    document.getElementById('content').innerHTML = '<p class="text-red-500">Fout: ' + e.message + '</p><button onclick="localStorage.clear();location.reload()" class="mt-4 text-blue-500">Opnieuw proberen</button>';
                }
            }
        }
        init();
    </script>
</body>
</html>
