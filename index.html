<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SpellenShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-8">
    <div id="app" class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl font-bold mb-4">SpellenShop</h1>
        <div id="content"><p>Verbinden met database...</p></div>
    </div>
    <script>
        const { createClient } = supabase;
        async function init() {
            // Vul hier je eigen Supabase gegevens in
            const url = 'JE_SUPABASE_URL_HIER';
            const key = 'JE_SUPABASE_ANON_KEY_HIER';
            const client = createClient(url, key);
            
            // Controleer je tabel: staat deze in 'spellendata'?
            const { data, error } = await client.from('spellendata').select('*');
            if (error) {
                document.getElementById('content').innerHTML = "Fout: " + error.message;
            } else {
                document.getElementById('content').innerHTML = "Aantal spellen gevonden: " + data.length;
            }
        }
        init();
    </script>
</body>
</html>
